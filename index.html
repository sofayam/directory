<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #666;
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    ul {
      list-style: none;
      width: 100%;
      max-width: 480px;
    }
    li { border-bottom: 1px solid #1e1e1e; }
    li:first-child { border-top: 1px solid #1e1e1e; }
    a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0.5rem;
      color: #e0e0e0;
      text-decoration: none;
      transition: color 0.15s;
    }
    a:hover { color: #fff; }
    a:hover .port { color: #888; }
    .name { font-size: 1rem; }
    .port { font-size: 0.8rem; color: #444; font-family: monospace; }
  </style>
</head>
<body>
  <h1>My Tiny Scruffy PWAs</h1>
  <ul id="list"></ul>
  <script>
    const apps = [
      { name: "jdict",     port: 8016 },
      { name: "transpod",  port: 8014 },
      { name: "player",    port: 8013 },
      { name: "replay",    port: 3333 },
      { name: "portainer", port: 9443, proto: "https" },
      { name: "shopping",  port: 3001 },
      { name: "vaultwarden", url: "https://vwx.tail8a2664.ts.net" },
    ];
    const host = window.location.hostname;
    const ul = document.getElementById("list");
    apps.forEach(({ name, port, proto, url }) => {
      const href = url ?? `${proto ?? "http"}://${host}:${port}`;
      const label = url ? new URL(url).host : `:${port}`;
      ul.insertAdjacentHTML("beforeend",
        `<li><a href="${href}" target="_blank">
          <span class="name">${name}</span><span class="port">${label}</span>
        </a></li>`
      );
    });
  </script>
</body>
</html>
